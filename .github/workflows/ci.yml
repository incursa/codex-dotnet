name: CI

on:
  push:
    branches:
      - "**"
    tags-ignore:
      - "v*.*.*"
  pull_request:
  workflow_dispatch:

jobs:
  build-test-pack:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    concurrency:
      group: ci-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore Incursa.OpenAI.Codex.slnx

      - name: Build
        run: dotnet build Incursa.OpenAI.Codex.slnx --no-restore --configuration Release -p:ContinuousIntegrationBuild=true

      - name: Run tests
        run: dotnet test Incursa.OpenAI.Codex.slnx --no-build --configuration Release -v minimal

      - name: Pack NuGet packages
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force artifacts/packages | Out-Null
          dotnet pack src/Incursa.OpenAI.Codex/Incursa.OpenAI.Codex.csproj --configuration Release --no-build --output artifacts/packages /p:ContinuousIntegrationBuild=true
          dotnet pack src/Incursa.OpenAI.Codex.Extensions/Incursa.OpenAI.Codex.Extensions.csproj --configuration Release --no-build --output artifacts/packages /p:ContinuousIntegrationBuild=true
